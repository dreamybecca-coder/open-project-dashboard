<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开源案主评估系统 V3 - 100分制</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 40px;
            border-bottom: 1px solid #2d2d44;
        }
        .header h1 {
            font-size: 24px;
            color: #fff;
            margin-bottom: 8px;
        }
        .header .subtitle {
            color: #888;
            font-size: 14px;
        }
        .stats-bar {
            display: flex;
            gap: 20px;
            padding: 20px 40px;
            background: #1a1a2e;
            flex-wrap: wrap;
        }
        .stat-item {
            background: #252540;
            padding: 15px 25px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-item .number {
            font-size: 28px;
            font-weight: bold;
        }
        .stat-item .label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        .stat-s { color: #ffd700; }
        .stat-a { color: #ff6b6b; }
        .stat-b { color: #4ecdc4; }
        .stat-total { color: #a0a0ff; }

        .top10-section {
            padding: 30px 40px;
        }
        .section-title {
            font-size: 18px;
            color: #fff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #ffd700;
            border-radius: 2px;
        }

        .top10-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 15px;
        }
        .top-card {
            background: linear-gradient(135deg, #1e1e3f 0%, #252545 100%);
            border: 1px solid #3d3d6b;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .top-card:hover {
            border-color: #ffd700;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.15);
        }
        .top-card.rank1 {
            border-color: #ffd700;
            background: linear-gradient(135deg, #2a2a4a 0%, #1e1e3f 100%);
        }
        .top-card .rank {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
            margin-right: 15px;
        }
        .top-card.rank1 .rank { color: #ffd700; }
        .top-card .info { flex: 1; }
        .top-card .name {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }
        .top-card .score-line {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }
        .top-card .score-badge {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        .top-card .grade-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .grade-S { background: #ffd700; color: #000; }
        .grade-A { background: #ff6b6b; color: #fff; }
        .grade-B { background: #4ecdc4; color: #000; }

        .top-card .detail-row {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 10px;
        }
        .top-card .person-bar, .top-card .project-bar {
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }
        .top-card .person-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
        }
        .top-card .project-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            border-radius: 3px;
        }

        .tabs {
            display: flex;
            gap: 5px;
            padding: 20px 40px;
            background: #1a1a2e;
            border-bottom: 1px solid #2d2d44;
        }
        .tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 14px;
        }
        .tab:hover { background: #252540; color: #fff; }
        .tab.active { background: #ffd700; color: #000; font-weight: bold; }

        .filters {
            display: flex;
            gap: 15px;
            padding: 20px 40px;
            flex-wrap: wrap;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-group label {
            font-size: 13px;
            color: #888;
        }
        .filter-group select {
            background: #252540;
            border: 1px solid #3d3d6b;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
        }
        .search-input {
            background: #252540;
            border: 1px solid #3d3d6b;
            color: #fff;
            padding: 8px 15px;
            border-radius: 6px;
            width: 250px;
            font-size: 13px;
        }
        .search-input::placeholder { color: #666; }

        .table-container {
            padding: 20px 40px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            background: #1e1e3f;
            padding: 12px 15px;
            text-align: left;
            color: #888;
            font-weight: 500;
            border-bottom: 2px solid #3d3d6b;
            white-space: nowrap;
            cursor: pointer;
        }
        th:hover { color: #fff; }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #2a2a4a;
            color: #ccc;
        }
        tr:hover { background: #1e1e3f; }
        tr.clickable { cursor: pointer; }

        .score-cell {
            font-weight: bold;
        }
        .score-high { color: #ffd700; }
        .score-mid { color: #4ecdc4; }
        .score-low { color: #888; }

        .grade-cell {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        .person-detail, .project-detail {
            display: flex;
            gap: 5px;
            font-size: 11px;
        }
        .person-detail span, .project-detail span {
            padding: 2px 6px;
            background: #333;
            border-radius: 4px;
        }
        .p1 { color: #667eea; }
        .p2 { color: #764ba2; }
        .p3 { color: #f093fb; }
        .p4 { color: #f5576c; }
        .p5 { color: #4ecdc4; }
        .d1 { color: #ffd700; }
        .d2 { color: #ff6b6b; }
        .d3 { color: #4ecdc4; }
        .d4 { color: #00d9ff; }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 30px;
        }
        .pagination button {
            background: #252540;
            border: 1px solid #3d3d6b;
            color: #fff;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pagination button:hover:not(:disabled) { background: #3d3d6b; }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination .page-info { color: #888; font-size: 14px; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #1a1a2e;
            border-radius: 16px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 25px 30px;
            border-bottom: 1px solid #2d2d44;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: #1a1a2e;
            z-index: 1;
        }
        .modal-header h2 {
            font-size: 22px;
            color: #fff;
        }
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
        }
        .modal-close:hover { color: #fff; }
        .modal-body { padding: 30px; }

        .modal-score-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .modal-score-box {
            background: #252540;
            border-radius: 12px;
            padding: 20px;
        }
        .modal-score-box h4 {
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
        }
        .modal-score-box .big-score {
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
        }
        .modal-score-box .score-detail {
            margin-top: 15px;
        }
        .modal-score-box .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333;
            font-size: 13px;
        }
        .modal-score-box .detail-item:last-child { border: none; }
        .modal-score-box .detail-label { color: #888; }
        .modal-score-box .detail-value { color: #fff; font-weight: 500; }

        .modal-section {
            margin-bottom: 25px;
        }
        .modal-section h4 {
            font-size: 16px;
            color: #fff;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #3d3d6b;
        }
        .modal-section p {
            font-size: 14px;
            line-height: 1.8;
            color: #bbb;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #ffd700;
            color: #000;
            border: none;
        }
        .btn-primary:hover { background: #ffcc00; }

        @media (max-width: 768px) {
            .header { padding: 15px 20px; }
            .stats-bar { padding: 15px 20px; gap: 10px; }
            .stat-item { padding: 10px 15px; }
            .stat-item .number { font-size: 22px; }
            .top10-section, .filters, .table-container { padding: 15px 20px; }
            .modal-score-section { grid-template-columns: 1fr; }
            .top10-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>开源案主评估系统 V3</h1>
        <div class="subtitle">100分制 · 人评50分 + 项评50分 · 基于实战经验、国际视野、业务成绩、专业能力、创业基因</div>
    </div>

    <div class="stats-bar" id="statsBar"></div>

    <div class="top10-section">
        <div class="section-title">TOP 10 核心名单</div>
        <div class="top10-grid" id="top10Grid"></div>
    </div>

    <div class="tabs">
        <button class="tab active" data-grade="all">全部</button>
        <button class="tab" data-grade="S">S级</button>
        <button class="tab" data-grade="A">A级</button>
        <button class="tab" data-grade="B">B级</button>
        <button class="tab" data-grade="C">C级</button>
    </div>

    <div class="filters">
        <div class="filter-group">
            <label>地区:</label>
            <select id="regionFilter">
                <option value="">全部</option>
                <option value="华北">华北</option>
                <option value="华东">华东</option>
                <option value="华南">华南</option>
                <option value="华中">华中</option>
                <option value="西南">西南</option>
                <option value="西北">西北</option>
                <option value="东北">东北</option>
            </select>
        </div>
        <div class="filter-group">
            <label>类型:</label>
            <select id="typeFilter">
                <option value="">全部</option>
                <option value="组队案主">组队案主</option>
                <option value="个人案主">个人案主</option>
            </select>
        </div>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索姓名...">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th data-sort="rank">排名</th>
                    <th data-sort="name">姓名</th>
                    <th data-sort="score100">总分</th>
                    <th data-sort="personScore">人评</th>
                    <th>人评明细</th>
                    <th data-sort="projectScore">项评</th>
                    <th>项评明细</th>
                    <th>等级</th>
                    <th>方向</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="pagination" id="pagination"></div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">项目详情</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        let allProjects = [];
        let filteredProjects = [];
        let currentPage = 1;
        const pageSize = 20;
        let currentSort = { field: 'score100', asc: false };
        let currentGrade = 'all';

        // Load data
        async function loadData() {
            const response = await fetch('evaluated_projects_v3.json');
            const data = await response.json();
            allProjects = data.projects;
            updateStats();
            applyFilters();
        }

        function updateStats() {
            const stats = {
                total: allProjects.length,
                S: allProjects.filter(p => p.grade === 'S+').length + allProjects.filter(p => p.grade === 'S').length,
                A: allProjects.filter(p => p.grade === 'A').length,
                B: allProjects.filter(p => p.grade === 'B').length,
                C: allProjects.filter(p => p.grade === 'C').length,
                D: allProjects.filter(p => p.grade === 'D').length
            };
            document.getElementById('statsBar').innerHTML = `
                <div class="stat-item">
                    <div class="number stat-total">${stats.total}</div>
                    <div class="label">全部项目</div>
                </div>
                <div class="stat-item">
                    <div class="number stat-s">${stats.S}</div>
                    <div class="label">S级必听</div>
                </div>
                <div class="stat-item">
                    <div class="number stat-a">${stats.A}</div>
                    <div class="label">A级推荐</div>
                </div>
                <div class="stat-item">
                    <div class="number stat-b">${stats.B}</div>
                    <div class="label">B级关注</div>
                </div>
                <div class="stat-item">
                    <div class="number">${stats.C + stats.D}</div>
                    <div class="label">C/D级</div>
                </div>
            `;
        }

        function renderTop10() {
            const top10 = filteredProjects.slice(0, 10);
            const grid = document.getElementById('top10Grid');
            grid.innerHTML = top10.map((p, i) => {
                const personPct = (p.personScore / 50 * 100).toFixed(0);
                const projectPct = (p.projectScore / 50 * 100).toFixed(0);
                const gradeClass = p.grade === 'S+' || p.grade === 'S' ? 'grade-S' : p.grade === 'A' ? 'grade-A' : 'grade-B';
                const rankClass = i === 0 ? 'rank1' : '';
                return `
                    <div class="top-card ${rankClass}" onclick="openModal(${p.id})">
                        <div style="display: flex; align-items: flex-start;">
                            <div class="rank">${p.rank}</div>
                            <div class="info">
                                <div class="name">${p.name}</div>
                                <div class="score-line">
                                    <span class="score-badge">${p.score100.toFixed(1)}分</span>
                                    <span class="grade-badge ${gradeClass}">${p.grade} ${p.gradeReason}</span>
                                </div>
                                <div class="detail-row">
                                    <span>地区: ${p.region || '-'}</span>
                                    <span>学分: ${p.credits}</span>
                                </div>
                                <div style="display: flex; gap: 10px; font-size: 12px; color: #888;">
                                    <span>人评: ${p.personScore.toFixed(1)}/50</span>
                                    <span>项评: ${p.projectScore.toFixed(1)}/50</span>
                                </div>
                                <div class="person-bar"><div class="person-bar-fill" style="width: ${personPct}%"></div></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function applyFilters() {
            const region = document.getElementById('regionFilter').value;
            const type = document.getElementById('typeFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            filteredProjects = allProjects.filter(p => {
                if (currentGrade !== 'all' && p.grade !== currentGrade && !(currentGrade === 'S' && (p.grade === 'S' || p.grade === 'S+'))) return false;
                if (region && p.region !== region) return false;
                if (type && !p.registerType.includes(type.replace('案主', ''))) return false;
                if (search && !p.name.toLowerCase().includes(search)) return false;
                return true;
            });

            sortProjects();
            renderTop10();
            renderTable();
            renderPagination();
        }

        function sortProjects() {
            filteredProjects.sort((a, b) => {
                let aVal = a[currentSort.field];
                let bVal = b[currentSort.field];
                if (currentSort.field === 'rank') {
                    aVal = a.rank;
                    bVal = b.rank;
                }
                return currentSort.asc ? aVal - bVal : bVal - aVal;
            });
        }

        function renderTable() {
            const start = (currentPage - 1) * pageSize;
            const pageData = filteredProjects.slice(start, start + pageSize);
            const tbody = document.getElementById('tableBody');

            tbody.innerHTML = pageData.map(p => {
                const scoreClass = p.score100 >= 70 ? 'score-high' : p.score100 >= 60 ? 'score-mid' : 'score-low';
                const gradeClass = p.grade === 'S' || p.grade === 'S+' ? 'grade-S' : p.grade === 'A' ? 'grade-A' : p.grade === 'B' ? 'grade-B' : '';
                const pd = p.personDetail;
                const pj = p.projectDetail;

                return `
                    <tr class="clickable" onclick="openModal(${p.id})">
                        <td>${p.rank}</td>
                        <td><strong>${p.name}</strong></td>
                        <td class="score-cell ${scoreClass}">${p.score100.toFixed(1)}</td>
                        <td class="score-cell ${scoreClass}">${p.personScore.toFixed(1)}</td>
                        <td>
                            <div class="person-detail">
                                <span class="p1" title="实战经验">经${pd.p1_exp.toFixed(0)}</span>
                                <span class="p2" title="国际视野">国${pd.p2_intl.toFixed(0)}</span>
                                <span class="p3" title="业务成绩">绩${pd.p3_achieve.toFixed(0)}</span>
                                <span class="p4" title="专业能力">能${pd.p4_prof.toFixed(0)}</span>
                                <span class="p5" title="创业基因">创${pd.p5_entre.toFixed(0)}</span>
                            </div>
                        </td>
                        <td class="score-cell ${scoreClass}">${p.projectScore.toFixed(1)}</td>
                        <td>
                            <div class="project-detail">
                                <span class="d1" title="领域相关">相${pj.d1_related.toFixed(0)}</span>
                                <span class="d2" title="项目成熟">熟${pj.d2_mature.toFixed(0)}</span>
                                <span class="d3" title="协同价值">协${pj.d3_collab.toFixed(0)}</span>
                                <span class="d4" title="学习价值">学${pj.d4_learn.toFixed(0)}</span>
                            </div>
                        </td>
                        <td><span class="grade-cell ${gradeClass}">${p.grade} ${p.gradeReason}</span></td>
                        <td>${p.directions ? p.directions.join(', ') : '-'}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredProjects.length / pageSize);
            const pagination = document.getElementById('pagination');

            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = `<button onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
            html += `<span class="page-info">第 ${currentPage} / ${totalPages} 页 (${filteredProjects.length}条)</span>`;
            html += `<button onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;

            pagination.innerHTML = html;
        }

        function goPage(page) {
            currentPage = page;
            renderTable();
            renderPagination();
        }

        function openModal(id) {
            const p = allProjects.find(x => x.id === id);
            if (!p) return;

            document.getElementById('modalTitle').textContent = `${p.name} - ${p.grade} ${p.gradeReason}`;
            document.getElementById('modalBody').innerHTML = `
                <div class="modal-score-section">
                    <div class="modal-score-box">
                        <h4>人评 (满分50分)</h4>
                        <div class="big-score">${p.personScore.toFixed(1)}</div>
                        <div class="score-detail">
                            <div class="detail-item">
                                <span class="detail-label">P1 实战经验</span>
                                <span class="detail-value">${p.personDetail.p1_exp.toFixed(1)} / 10</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">P2 国际视野</span>
                                <span class="detail-value">${p.personDetail.p2_intl.toFixed(1)} / 10</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">P3 业务成绩</span>
                                <span class="detail-value">${p.personDetail.p3_achieve.toFixed(1)} / 15</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">P4 专业能力</span>
                                <span class="detail-value">${p.personDetail.p4_prof.toFixed(1)} / 8</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">P5 创业基因</span>
                                <span class="detail-value">${p.personDetail.p5_entre.toFixed(1)} / 7</span>
                            </div>
                        </div>
                    </div>
                    <div class="modal-score-box">
                        <h4>项评 (满分50分)</h4>
                        <div class="big-score">${p.projectScore.toFixed(1)}</div>
                        <div class="score-detail">
                            <div class="detail-item">
                                <span class="detail-label">D1 领域相关</span>
                                <span class="detail-value">${p.projectDetail.d1_related.toFixed(1)} / 15</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">D2 项目成熟</span>
                                <span class="detail-value">${p.projectDetail.d2_mature.toFixed(1)} / 15</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">D3 协同价值</span>
                                <span class="detail-value">${p.projectDetail.d3_collab.toFixed(1)} / 10</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">D4 学习价值</span>
                                <span class="detail-value">${p.projectDetail.d4_learn.toFixed(1)} / 10</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="text-align: center; font-size: 32px; font-weight: bold; margin-bottom: 30px;">
                    总分: <span style="color: #ffd700;">${p.score100.toFixed(1)}</span> / 100
                </div>

                <div class="modal-section">
                    <h4>个人背景</h4>
                    <p>${p.intro || '暂无介绍'}</p>
                </div>

                <div class="modal-section">
                    <h4>项目介绍</h4>
                    <p>${p.projectIntro || '暂无介绍'}</p>
                </div>

                <div class="modal-section">
                    <h4>创业计划</h4>
                    <p>${p.plan || '暂无计划'}</p>
                </div>

                <div class="modal-section">
                    <h4>与一堂的故事</h4>
                    <p>${p.story || '暂无内容'}</p>
                </div>
            `;

            document.getElementById('modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        // Event listeners
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentGrade = tab.dataset.grade;
                currentPage = 1;
                applyFilters();
            });
        });

        document.getElementById('regionFilter').addEventListener('change', applyFilters);
        document.getElementById('typeFilter').addEventListener('change', applyFilters);
        document.getElementById('searchInput').addEventListener('input', () => {
            currentPage = 1;
            applyFilters();
        });

        document.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                const field = th.dataset.sort;
                if (currentSort.field === field) {
                    currentSort.asc = !currentSort.asc;
                } else {
                    currentSort.field = field;
                    currentSort.asc = false;
                }
                sortProjects();
                renderTop10();
                renderTable();
            });
        });

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal')) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Init
        loadData();
    </script>
</body>
</html>
